<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<title>Cookie Guardian</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#080c14; --s1:#0d1421; --s2:#111827; --border:#1e2d45;
  --accent:#00d4ff; --accent2:#7c3aed; --green:#22c55e; --red:#f43f5e;
  --orange:#f97316; --yellow:#eab308; --text:#e2e8f0; --muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{width:340px;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;user-select:none}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:linear-gradient(135deg,#080c14,#0d1a2e);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 0 12px rgba(0,212,255,.25)}
.logo-name{font-size:13px;font-weight:800;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge-ver{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:2px 6px;border-radius:4px}
/* TOGGLE */
.toggle{position:relative;width:38px;height:21px;cursor:pointer}
.toggle input{display:none}
.slider{position:absolute;inset:0;background:var(--border);border-radius:21px;transition:.2s}
.slider::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.2s}
input:checked+.slider{background:var(--accent)}
input:checked+.slider::before{transform:translateX(17px);background:#fff;box-shadow:0 0 6px rgba(0,212,255,.5)}
/* SITE BAR */
.site-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--border)}
.site-info{display:flex;align-items:center;gap:7px}
.site-favicon{width:16px;height:16px;border-radius:3px;background:var(--border);object-fit:contain}
.site-name{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--text);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.risk-pill{padding:2px 9px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;border:1px solid currentColor}
/* STAT GRID */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.stat{padding:11px 10px;background:var(--s1);text-align:center}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:3px}
/* COOKIES LIST */
.cookies-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.sec-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.sec-action{font-size:10px;color:var(--accent);cursor:pointer;opacity:.7;transition:.15s}
.sec-action:hover{opacity:1}
.cookies-list{max-height:130px;overflow-y:auto;padding:0 10px 8px}
.cookies-list::-webkit-scrollbar{width:3px}
.cookies-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cookie-row{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:6px;margin-bottom:2px;transition:.1s}
.cookie-row:hover{background:rgba(255,255,255,.04)}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-Analytics{background:#f59e0b}
.cat-Marketing{background:#f43f5e}
.cat-Functional{background:#22c55e}
.cat-Session{background:#00d4ff}
.cat-Unknown{background:#64748b}
.cookie-name{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cookie-cat{font-size:9px;color:var(--muted)}
.cookie-wl{font-size:8px;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);padding:1px 5px;border-radius:4px;white-space:nowrap}
.no-cookies{text-align:center;color:var(--muted);font-size:11px;padding:16px;font-style:italic}
/* ACTIONS */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px;border-top:1px solid var(--border)}
.btn{padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:11px;font-family:'Syne',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:600}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06)}
.btn.danger:hover{border-color:var(--red);color:var(--red);background:rgba(244,63,94,.06)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
.btn.primary:hover{opacity:.85;color:#fff}
.btn.full{grid-column:1/-1}
/* FOOTER */
.footer{display:flex;justify-content:center;gap:6px;padding:8px 12px 10px;border-top:1px solid var(--border)}
.footer-link{font-size:10px;color:var(--muted);cursor:pointer;padding:3px 8px;border-radius:4px;transition:.12s;font-family:'JetBrains Mono',monospace}
.footer-link:hover{color:var(--text);background:var(--s2)}
/* TOAST */
.toast{position:fixed;bottom:12px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--s2);border:1px solid var(--border);padding:7px 14px;border-radius:7px;font-size:11px;color:var(--text);opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* LEGEND */
.legend{display:flex;gap:10px;padding:0 14px 8px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.leg-dot{width:6px;height:6px;border-radius:50%}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div>
      <div class="logo-name">Cookie Guardian</div>
      <div class="logo-sub">privacy protection v2</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="badge-ver">v2.0</span>
    <label class="toggle" title="Ativar/Desativar proteção">
      <input type="checkbox" id="toggle" checked/>
      <span class="slider"></span>
    </label>
  </div>
</header>

<!-- Current Site -->
<div class="site-bar">
  <div class="site-info">
    <img class="site-favicon" id="favicon" src="" alt=""/>
    <span class="site-name" id="site-name">Carregando…</span>
  </div>
  <div class="risk-pill" id="risk-pill" style="color:var(--muted);border-color:var(--muted)">—</div>
</div>

<!-- Global Stats -->
<div class="stats">
  <div class="stat"><div class="stat-val" id="s-cookies">0</div><div class="stat-lbl">Cookies<br>removidos</div></div>
  <div class="stat"><div class="stat-val" id="s-trackers">0</div><div class="stat-lbl">Trackers<br>bloqueados</div></div>
  <div class="stat"><div class="stat-val" id="s-banners">0</div><div class="stat-lbl">Banners<br>rejeitados</div></div>
</div>

<!-- Cookie List -->
<div class="cookies-header">
  <span class="sec-title" id="cookie-count-label">Cookies neste site</span>
  <span class="sec-action" id="refresh-btn">↺ atualizar</span>
</div>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#f59e0b"></div>Analytics</div>
  <div class="leg"><div class="leg-dot" style="background:#f43f5e"></div>Marketing</div>
  <div class="leg"><div class="leg-dot" style="background:#22c55e"></div>Funcional</div>
  <div class="leg"><div class="leg-dot" style="background:#00d4ff"></div>Sessão</div>
  <div class="leg"><div class="leg-dot" style="background:#64748b"></div>Outro</div>
</div>
<div class="cookies-list" id="cookies-list">
  <div class="no-cookies">A carregar…</div>
</div>

<!-- Actions -->
<div class="actions">
  <button class="btn primary" id="btn-clear">🧹 Limpar agora</button>
  <button class="btn" id="btn-whitelist">✅ Whitelist</button>
  <button class="btn danger" id="btn-clear-all">🗑️ Limpar tudo</button>
  <button class="btn" id="btn-settings">⚙️ Definições</button>
</div>

<!-- Footer -->
<div class="footer">
  <span class="footer-link" id="lnk-options">Opções</span>
  <span class="footer-link" id="lnk-report">Relatório</span>
  <span class="footer-link" id="lnk-audit">Auditoria</span>
  <span class="footer-link" id="lnk-reset">Reset stats</span>
</div>

<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
