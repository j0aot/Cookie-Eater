<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cookie Rejector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --green: #10b981;
    --red: #f43f5e;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 300px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  .header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #0a0a0f 0%, #12101f 100%);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .logo-icon {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .logo-text span {
    display: block;
    color: var(--muted);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
  }

  .toggle-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
  }

  .toggle input { display: none; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 20px;
    transition: .2s;
    cursor: pointer;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    left: 3px;
    top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: .2s;
  }

  input:checked + .slider {
    background: var(--accent);
  }

  input:checked + .slider::before {
    transform: translateX(16px);
    background: #fff;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    padding: 14px 16px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
  }

  .pill-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    color: var(--muted);
    user-select: none;
  }

  .pill.active {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(124,58,237,0.12);
  }

  .pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
  }

  .pill.active .dot {
    background: var(--accent);
  }

  .sites-list {
    max-height: 80px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sites-list::-webkit-scrollbar { width: 3px; }
  .sites-list::-webkit-scrollbar-track { background: transparent; }
  .sites-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .site-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    font-size: 11px;
    color: var(--muted);
  }

  .site-item::before {
    content: '✓';
    color: var(--green);
    font-size: 10px;
  }

  .no-sites {
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    padding: 8px;
    font-style: italic;
  }

  .footer {
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }

  .reset-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .version {
    font-size: 10px;
    color: var(--border);
    font-family: 'Space Mono', monospace;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 8px 16px;
    background: rgba(16,185,129,0.08);
    border-bottom: 1px solid rgba(16,185,129,0.15);
    color: var(--green);
  }

  .status-bar.off {
    background: rgba(244,63,94,0.08);
    border-color: rgba(244,63,94,0.15);
    color: var(--red);
  }

  .pulse {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  .status-bar.off .pulse {
    background: var(--red);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  #disabled-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(2px);
    z-index: 10;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  #disabled-overlay.show {
    display: flex;
  }
</style>
</head>
<body>

<div id="disabled-overlay">— pausado —</div>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🍪</div>
    <div class="logo-text">
      Cookie Rejector
      <span>auto-rejeita & bloqueia</span>
    </div>
  </div>
  <label class="toggle-wrap" title="Ativar/Desativar">
    <span class="toggle-label" id="toggle-label">ON</span>
    <label class="toggle">
      <input type="checkbox" id="main-toggle" checked />
      <span class="slider"></span>
    </label>
  </label>
</header>

<div class="status-bar" id="status-bar">
  <div class="pulse"></div>
  <span id="status-text">Proteção ativa</span>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-value" id="stat-rejected">0</div>
    <div class="stat-label">Cookies rejeitados</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-blocked">0</div>
    <div class="stat-label">Trackers bloqueados</div>
  </div>
</div>

<div class="section">
  <div class="section-title">O que está bloqueado</div>
  <div class="pill-row">
    <div class="pill active"><span class="dot"></span>Analytics</div>
    <div class="pill active"><span class="dot"></span>Facebook Pixel</div>
    <div class="pill active"><span class="dot"></span>Google Tag</div>
    <div class="pill active"><span class="dot"></span>Hotjar</div>
    <div class="pill active"><span class="dot"></span>Heatmaps</div>
    <div class="pill active"><span class="dot"></span>Ads Tracking</div>
  </div>
</div>

<div class="section">
  <div class="section-title">Últimos sites protegidos</div>
  <div class="sites-list" id="sites-list">
    <div class="no-sites">Nenhum ainda — navegue um pouco!</div>
  </div>
</div>

<div class="footer">
  <button class="reset-btn" id="reset-btn">Limpar estatísticas</button>
  <span class="version">v1.0.0</span>
</div>

<script src="popup.js"></script>
</body>
</html>
